apiVersion: v1
kind: ServiceAccount
metadata:
  name: ipa-controller
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ipa-controller
rules:
# ---- IPA CRD access ----
- apiGroups: ["autoscaling.example.com"]
  resources: ["intelligentpodautoscalers"]
  verbs: ["get", "list", "watch", "patch", "update"]

# ---- Deployment scaling ----
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch", "update"]

# ---- Events (Kopf uses this) ----
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]

# ---- CRD discovery (Kopf needs this) ----
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ipa-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ipa-controller
subjects:
- kind: ServiceAccount
  name: ipa-controller
  namespace: default
