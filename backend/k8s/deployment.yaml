apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipa-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ipa-backend
  template:
    metadata:
      labels:
        app: ipa-backend
    spec:
      serviceAccountName: ipa-backend
      containers:
      - name: ipa-backend
        image: ipa-backend:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: PROMETHEUS_URL
          value: http://prometheus-k8s.monitoring.svc:9090
        - name: DEFAULT_NAMESPACE
          value: default
        - name: CORS_ORIGINS
          value: http://localhost:5173,http://localhost:5174,http://localhost:3000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
